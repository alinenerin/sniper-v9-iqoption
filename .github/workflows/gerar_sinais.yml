name: SniperFiltro - Gerar Sinais 🎯

on:
  workflow_dispatch:
    inputs:
      modo:
        description: 'FOREX, OTC ou AMBOS'
        required: false
        default: 'AMBOS'
        type: string

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install "websocket-client>=1.3.0" requests

      - name: Gerar Sinais M1
        env:
          IQ_USER: ${{ secrets.IQ_USER }}
          IQ_PASS: ${{ secrets.IQ_PASS }}
          MODO: ${{ inputs.modo }}
        run: python gerar_sinais_gha.py
