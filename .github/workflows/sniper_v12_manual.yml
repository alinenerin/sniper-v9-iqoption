name: Sniper V12 🎯

on:
  workflow_dispatch:
  schedule:
    # Roda a cada 5 minutos — 24h por dia, 7 dias por semana
    - cron: '*/5 * * * *'

jobs:
  sniper_v12:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install requests pytz flask websocket-client
      - name: Rodar Sniper V12
        env:
          IQ_EMAIL: ${{ secrets.IQ_EMAIL }}
          IQ_PASS: ${{ secrets.IQ_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: python3 v12_once.py
      - name: Upload de logs em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v12-log-${{ github.run_id }}
          path: estado_v121.json
          retention-days: 3
