name: Keep Alive 🔄

on:
  schedule:
    # A cada hora — mantém o cron ativo e dispara o V12
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep repo alive
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit --allow-empty -m "chore: keep-alive $(date -u '+%Y-%m-%d %H:%M')"
          git push
      - name: Disparar V12 agora
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sniper_v12_manual.yml/dispatches"
          echo "V12 disparado pelo keepalive!"
